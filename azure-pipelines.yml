trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: github-reminder-vars

steps:
  - task: NodeTool@0
    displayName: 'Use Node.js 20.x'
    inputs:
      versionSpec: '20.x'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npm run build
    displayName: 'Build'
    env:
      VITE_GITHUB_TOKEN: $(VITE_GITHUB_TOKEN)
      VITE_MSAL_CLIENT_ID: $(VITE_MSAL_CLIENT_ID)
      VITE_MSAL_TENANT_ID: $(VITE_MSAL_TENANT_ID)
      VITE_ADO_PAT: $(VITE_ADO_PAT)

  - task: AzureStaticWebApp@0
    displayName: 'Deploy to Azure Static Web Apps'
    inputs:
      app_location: '/'
      output_location: 'dist'
      azure_static_web_apps_api_token: $(AZURE_SWA_DEPLOYMENT_TOKEN)
